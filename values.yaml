# Values passed to the dependency chart (falcosecurity/falco)
falco:
  falco:
    jsonOutput: true
    httpOutput:
      enabled: true
      url: "http://falco-sidekick:2801"
  mounts:
    volumes:
      - name: custom-rules
        configMap:
          name: t12-falco-rules
    volumeMounts:
      - name: custom-rules
        mountPath: /etc/falco/rules.d
        readOnly: true

  falcosidekick:
    enabled: true
    config:
      debug: true
      webhook:
        address: "https://api.t12.io/v1/cwp/events"
        method: POST
      extraEnv:
        - name: WEBHOOK_CUSTOMHEADERS
          valueFrom:
            secretKeyRef:
              name: t12-falco-sidekick-customheaders
              key: customHeaders

# Values used by this wrapper chart
# NB: Don't change the name from heartbeat. I just implemented a rule override (under /falco-rules)
# that assumes this name
heartbeat:
  enabled: true
  nameSuffix: "heartbeat"
  schedule: "0 * * * *"
  concurrencyPolicy: "Forbid"
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 3

  startingDeadlineSeconds: 120 # if missed schedule, how long controller will still start it
  activeDeadlineSeconds: 60 # hard kill if it runs too long
  backoffLimit: 1

  secretRefName: t12-cwp-secret

  endpoint: "https://api.t12.io/v1"

  # Curl timeouts to avoid stuck Jobs
  curl:
    connectTimeoutSeconds: 20 
    maxTimeSeconds: 60 

  podLabels: {}
  podAnnotations: {}
